name: MPP Internet Corpus V2

on:
  workflow_dispatch:

jobs:
  run-mpp-corpus-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable skeleton loader
        run: perl -0pi -e "s/loadScript\('mpp-native-reader-resource-names-polish.js'\);/loadScript('mpp-native-reader-resource-names-polish.js');\n  loadScript('mpp-native-task-skeleton-polish.js');\n  loadScript('mpp-native-task-skeleton-v2-polish.js');\n  loadScript('mpp-native-task-skeleton-diagnostics-polish.js');\n  loadScript('mpp-native-task-dates-polish.js');/" scripts/run-mpp-internet-corpus.mjs
      - name: Run corpus
        run: node scripts/run-mpp-internet-corpus.mjs
      - name: Mark zero-task results opened-only
        run: node -e "const fs=require('fs');const p='mpp-internet-corpus-report.json';const r=JSON.parse(fs.readFileSync(p,'utf8'));r.version='0.3.0-node-mpp-internet-corpus-runner-v2-workflow';for(const x of r.results||[]){if(x.status==='passed'&&!(Number(x.tasks)>0)){x.status='opened_only';x.warnings=x.warnings||[];x.warnings.unshift('Opened container but parsed zero tasks. Not counted as a real import pass.')}const f=x.diagnostics?.fieldCoverage||{};x.taskSkeletonRows=f.taskSkeletonRows||0;x.taskSkeletonNamedRows=f.taskSkeletonNamedRows||0;x.taskSkeletonV2Rows=f.taskSkeletonV2Rows||0;x.taskSkeletonV2NamedRows=f.taskSkeletonV2NamedRows||0;x.taskStreamCount=f.taskStreamCount||0;x.taskLikeStreamCount=f.taskLikeStreamCount||0;x.taskHasFixedPair=f.taskHasFixedPair||0;x.taskHasVarPair=f.taskHasVarPair||0;x.taskFixedMetaSize=f.taskFixedMetaSize||0;x.taskFixedDataSize=f.taskFixedDataSize||0;x.taskVarMetaSize=f.taskVarMetaSize||0;x.taskVar2DataSize=f.taskVar2DataSize||0;x.taskDateRows=f.taskDateRows||0;x.taskDatesApplied=f.taskDatesApplied||0;x.taskDurationRows=f.taskDurationRows||0;x.taskDateConfidence=f.taskDateConfidence||'none';}r.passed=(r.results||[]).filter(x=>x.status==='passed').length;r.openedOnly=(r.results||[]).filter(x=>x.status==='opened_only').length;r.failed=(r.results||[]).filter(x=>x.status==='failed').length;r.totalTasks=(r.results||[]).reduce((s,x)=>s+Number(x.tasks||0),0);r.totalSkeletonRows=(r.results||[]).reduce((s,x)=>s+Number(x.taskSkeletonRows||0),0);r.totalSkeletonV2Rows=(r.results||[]).reduce((s,x)=>s+Number(x.taskSkeletonV2Rows||0),0);r.totalTaskDatesApplied=(r.results||[]).reduce((s,x)=>s+Number(x.taskDatesApplied||0),0);r.totalTaskDurationRows=(r.results||[]).reduce((s,x)=>s+Number(x.taskDurationRows||0),0);fs.writeFileSync(p,JSON.stringify(r,null,2));console.log('V2 parsed '+r.passed+'/'+r.corpusCount+' opened-only '+r.openedOnly+' tasks '+r.totalTasks+' dates '+r.totalTaskDatesApplied+' durations '+r.totalTaskDurationRows);"
      - uses: actions/upload-artifact@v4
        with:
          name: mpp-internet-corpus-v2-report
          path: mpp-internet-corpus-report.json
          if-no-files-found: error
