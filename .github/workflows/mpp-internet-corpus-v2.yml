name: MPP Internet Corpus V2

on:
  workflow_dispatch:

jobs:
  run-mpp-corpus-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable browser MPP modules
        run: perl -0pi -e "s/loadScript\('mpp-native-reader-resource-names-polish.js'\);/loadScript('mpp-native-reader-resource-names-polish.js');\n  loadScript('mpp-native-task-skeleton-polish.js');\n  loadScript('mpp-native-task-skeleton-v2-polish.js');\n  loadScript('mpp-native-task-skeleton-diagnostics-polish.js');\n  loadScript('mpp-native-task-dates-polish.js');\n  loadScript('mpp-native-task-fixed-dates-polish.js');\n  loadScript('mpp-native-resource-table-v2-polish.js');\n  loadScript('mpp-native-assignment-table-v3-polish.js');\n  loadScript('mpp-native-date-sanity-polish.js');/" scripts/run-mpp-internet-corpus.mjs
      - name: Run corpus
        run: node scripts/run-mpp-internet-corpus.mjs
      - name: Summarize V2 report
        run: node -e "const fs=require('fs');const p='mpp-internet-corpus-report.json';const r=JSON.parse(fs.readFileSync(p,'utf8'));r.version='0.5.1-browser-only-mpp-corpus-date-sanity';for(const x of r.results||[]){if(x.status==='passed'&&!(Number(x.tasks)>0)){x.status='opened_only';x.warnings=x.warnings||[];x.warnings.unshift('Opened container but parsed zero tasks. Not counted as a real import pass.')}const f=x.diagnostics?.fieldCoverage||{};x.taskSkeletonRows=f.taskSkeletonRows||0;x.taskFixedDatesApplied=f.taskFixedDatesApplied||0;x.nativeDateSanityRejected=f.nativeDateSanityRejected||0;x.nativeDateSanitySpanDays=f.nativeDateSanitySpanDays||0;x.resourceRows=f.resourceRows||0;x.resourceNamesApplied=f.resourceNamesApplied||0;x.assignmentRows=f.assignmentRows||0;x.assignmentTaskLinks=f.assignmentTaskLinks||0;x.assignmentResourceLinks=f.assignmentResourceLinks||0;x.assignmentsApplied=f.assignmentsApplied||0;x.assignmentV3Confidence=f.assignmentV3Confidence||0;}r.passed=(r.results||[]).filter(x=>x.status==='passed').length;r.openedOnly=(r.results||[]).filter(x=>x.status==='opened_only').length;r.failed=(r.results||[]).filter(x=>x.status==='failed').length;r.totalTasks=(r.results||[]).reduce((s,x)=>s+Number(x.tasks||0),0);r.totalNativeDateSanityRejected=(r.results||[]).reduce((s,x)=>s+Number(x.nativeDateSanityRejected||0),0);r.totalTaskFixedDatesApplied=(r.results||[]).reduce((s,x)=>s+Number(x.taskFixedDatesApplied||0),0);r.totalResourceRows=(r.results||[]).reduce((s,x)=>s+Number(x.resourceRows||0),0);r.totalResourceNamesApplied=(r.results||[]).reduce((s,x)=>s+Number(x.resourceNamesApplied||0),0);r.totalAssignmentRows=(r.results||[]).reduce((s,x)=>s+Number(x.assignmentRows||0),0);r.totalAssignmentsApplied=(r.results||[]).reduce((s,x)=>s+Number(x.assignmentsApplied||0),0);fs.writeFileSync(p,JSON.stringify(r,null,2));console.log('V2 parsed '+r.passed+'/'+r.corpusCount+' tasks '+r.totalTasks+' dateRejects '+r.totalNativeDateSanityRejected+' resources '+r.totalResourceRows+' assignmentsApplied '+r.totalAssignmentsApplied);"
      - uses: actions/upload-artifact@v4
        with:
          name: mpp-internet-corpus-v2-report
          path: mpp-internet-corpus-report.json
          if-no-files-found: error
